services:
  - type: web
    name: squadsync-backend
    runtime: python
    rootDir: .
    buildCommand: "pip install -r backend/requirements.txt && python manage.py migrate --no-input && python manage.py collectstatic --no-input"
    startCommand: "gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://squadsync-frontend.onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"

  - type: web
    name: squadsync-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://squadsync-backend.onrender.com/api"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
