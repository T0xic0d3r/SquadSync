services:
  - type: web
    name: squadsync-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://squadsync-frontend.onrender.com
      - key: DATABASE_URL
        value: sqlite:///./db.sqlite3
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: web
    name: squadsync-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://squadsync-backend.onrender.com/api/$1
      - type: rewrite
        source: /*
        destination: /index.html
