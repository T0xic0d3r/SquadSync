name: SquadSync CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  frontend:
    name: Frontend CI (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm install
      - run: cd frontend && npm run lint --if-present
      - run: cd frontend && npm run build --if-present
      - run: cd frontend && npm test --if-present -- --watchAll=false

  backend:
    name: Backend CI (Django)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Lint
        run: |
          pip install flake8
          cd backend
          flake8 . --max-line-length=100 --exclude=migrations
      - name: Run migrations
        run: |
          cd backend
          python manage.py migrate
        env:
          DJANGO_SECRET_KEY: test-secret-key
          DEBUG: "True"
      - name: Run tests
        run: |
          cd backend
          python manage.py test
        env:
          DJANGO_SECRET_KEY: test-secret-key
          DEBUG: "True"
