name: SquadSync CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop

jobs:
  frontend:
    name: Frontend CI (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm install
      - name: Lint
        run: cd frontend && npm run lint --if-present
      - name: Build
        run: cd frontend && npm run build --if-present
      - name: Test
        run: cd frontend && npm test --if-present -- --watchAll=false

  backend:
    name: Backend CI (Python/FastAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Lint
        run: |
          pip install flake8
          cd backend
          flake8 src/ --max-line-length=100 --ignore=E501
      - name: Test
        run: |
          pip install pytest
          cd backend
          pytest --if-present
